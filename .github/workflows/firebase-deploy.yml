name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Security audit (frontend)
        run: npm audit --audit-level=high

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Unit tests (functions)
        run: npm test
        working-directory: functions

      - name: Security audit (functions)
        run: npm audit --audit-level=high
        working-directory: functions

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Fetch Firebase config
        run: |
          CONFIG=$(curl -s \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            "https://firebase.googleapis.com/v1beta1/projects/${{ secrets.FIREBASE_PROJECT_ID }}/webApps/1:64586289399:web:430d329388e0ceaed3c3f2/config")
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=$(echo $CONFIG | jq -r '.apiKey')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$(echo $CONFIG | jq -r '.authDomain')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$(echo $CONFIG | jq -r '.projectId')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$(echo $CONFIG | jq -r '.storageBucket')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$(echo $CONFIG | jq -r '.messagingSenderId')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=$(echo $CONFIG | jq -r '.appId')" >> $GITHUB_ENV

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SEND_MESSAGE_URL: ${{ secrets.ESPV2_URL }}/api/send-message

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy hosting and functions
        run: npx firebase-tools@latest deploy --only hosting,functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --force
